<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
  </head>
  <body>
    <script>
      (function redirectToSpa() {
        var segmentsToKeep = 1;
        var locationRef = window.location;
        var newUrl =
          locationRef.protocol +
          "//" +
          locationRef.hostname +
          (locationRef.port ? ":" + locationRef.port : "") +
          locationRef.pathname.split("/").slice(0, segmentsToKeep + 1).join("/") +
          "/?/" +
          locationRef.pathname.slice(1).split("/").slice(segmentsToKeep).join("/").replace(/&/g, "~and~") +
          (locationRef.search
            ? "&" + locationRef.search.slice(1).replace(/&/g, "~and~")
            : "") +
          locationRef.hash;

        locationRef.replace(newUrl);
      })();
    </script>
  </body>
</html>
